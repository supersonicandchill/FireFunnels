<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire / EMS Toolkit</title>

<style>
body { font-family: Arial; margin:0; background:#111; color:#fff; }
header { padding:12px; text-align:center; background:#222; }

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
  font-size:16px;
}

.selected { background:#28a745 !important; }

.tabs { display:flex; }
.tab {
  flex:1;
  padding:10px;
  text-align:center;
  background:#333;
  cursor:pointer;
}
.tab.active { background:#555; }

.content { display:none; padding:10px; }
.content.active { display:block; }

.card {
  background:#1c1c1c;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
}

.back { background:#444; }
.notice { text-align:center; opacity:.7; padding:10px; }
.hidden { display:none; }
</style>
</head>

<body>

<header><h2>Fire / EMS Toolkit</h2></header>

<!-- HOME -->
<div id="home">
  <div class="card"><button onclick="openModule('sizeup')">Size-Up</button></div>
  <div class="card"><button onclick="openModule('search')">Search</button></div>
  <div class="card"><button onclick="openModule('medical')">Medical</button></div>
  <div class="card"><button onclick="openModule('stroke')">Stroke</button></div>
  <div class="card"><button onclick="openModule('alarm')">Alarm</button></div>
</div>

<!-- MODULE -->
<div id="module" class="hidden">

<button class="back" onclick="goHome()">← Back</button>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Input</div>
  <div class="tab" onclick="switchTab(1)">Process</div>
  <div class="tab" onclick="switchTab(2)">Output</div>
</div>

<!-- TAB 0 -->
<div id="tab0" class="content active">

  <div id="input-area"></div>

</div>

<!-- TAB 1 -->
<div id="tab1" class="content">
  <div id="process-area" class="card"></div>
</div>

<!-- TAB 2 -->
<div id="tab2" class="content">
  <div id="output-area" class="card"></div>
</div>

</div>

<script>

let currentModule = "";
let state = {};

// ---------------- NAV ----------------
function openModule(name){
  currentModule = name;
  state = {};

  document.getElementById("home").classList.add("hidden");
  document.getElementById("module").classList.remove("hidden");

  buildInput();
  switchTab(0);
}

function goHome(){
  document.getElementById("module").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// ---------------- TABS ----------------
function switchTab(i){
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("active", idx===i);
  });

  document.querySelectorAll(".content").forEach((c,idx)=>{
    c.classList.toggle("active", idx===i);
  });

  if(i===1) buildProcess();
  if(i===2) buildOutput();
}

// ---------------- INPUT ----------------
function buildInput(){
  let c = document.getElementById("input-area");
  c.innerHTML = "";

  if(currentModule==="sizeup"){
    c.innerHTML = `
      <div class="card">Fire
        <button onclick="select(this,'fire','none')">None</button>
        <button onclick="select(this,'fire','room')">Room</button>
        <button onclick="select(this,'fire','structure')">Structure</button>
      </div>

      <div class="card">Occupancy
        <button onclick="select(this,'occ','res')">Residential</button>
        <button onclick="select(this,'occ','comm')">Commercial</button>
      </div>
    `;
  }

  if(currentModule==="search"){
    c.innerHTML = `
      <div class="card">Smoke
        <button onclick="select(this,'smoke','light')">Light</button>
        <button onclick="select(this,'smoke','heavy')">Heavy</button>
      </div>
    `;
  }

  if(currentModule==="medical"){
    c.innerHTML = `
      <div class="card">Complaint
        <button onclick="select(this,'cc','chest')">Chest Pain</button>
        <button onclick="select(this,'cc','breathing')">Breathing</button>
      </div>
    `;
  }

  if(currentModule==="stroke"){
    c.innerHTML = `
      <div class="card">Stroke Check
        <button onclick="select(this,'stroke','yes')">Positive</button>
        <button onclick="select(this,'stroke','no')">Negative</button>
      </div>
    `;
  }

  if(currentModule==="alarm"){
    c.innerHTML = `
      <div class="card">Alarm
        <button onclick="select(this,'alarm','waterflow')">Waterflow</button>
        <button onclick="select(this,'alarm','other')">Other</button>
      </div>
    `;
  }
}

// ---------------- SELECT ----------------
function select(el, key, val){
  state[key] = val;

  // highlight
  let group = el.parentElement;
  group.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  el.classList.add("selected");
}

// ---------------- PROCESS ----------------
function buildProcess(){
  let c = document.getElementById("process-area");

  if(Object.keys(state).length === 0){
    c.innerHTML = "Make a selection first";
    return;
  }

  if(currentModule==="sizeup"){
    let mode = "Investigative";
    if(state.fire==="room") mode="Offensive";
    if(state.fire==="structure") mode="Defensive";
    state.mode = mode;
    c.innerHTML = "Mode: " + mode;
  }

  if(currentModule==="search"){
    let p = state.smoke==="heavy" ? "Bedrooms first" : "Standard sweep";
    state.priority = p;
    c.innerHTML = p;
  }

  if(currentModule==="medical"){
    let a = state.cc==="chest" ? "Cardiac Alert" : "Standard Care";
    state.alert = a;
    c.innerHTML = a;
  }

  if(currentModule==="stroke"){
    let s = state.stroke==="yes" ? "Stroke Alert" : "No Alert";
    state.result = s;
    c.innerHTML = s;
  }

  if(currentModule==="alarm"){
    let act = state.alarm==="waterflow" ? "Investigate fire" : "Check panel";
    state.action = act;
    c.innerHTML = act;
  }
}

// ---------------- OUTPUT ----------------
function buildOutput(){
  let c = document.getElementById("output-area");

  if(Object.keys(state).length === 0){
    c.innerHTML = "No decision yet";
    return;
  }

  if(currentModule==="sizeup"){
    c.innerHTML = "Deploy based on: " + state.mode;
  }

  if(currentModule==="search"){
    c.innerHTML = "Search plan: " + state.priority;
  }

  if(currentModule==="medical"){
    c.innerHTML = "Treatment: " + state.alert;
  }

  if(currentModule==="stroke"){
    c.innerHTML = "Decision: " + state.result;
  }

  if(currentModule==="alarm"){
    c.innerHTML = "Action: " + state.action;
  }
}

</script>

</body>
</html>
