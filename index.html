<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire/EMS Toolkit</title>

<style>
body { font-family: Arial; margin:0; background:#111; color:#fff; }
header { padding:12px; text-align:center; background:#222; }

.tabs { display:flex; }
.tab {
  flex:1; padding:12px; text-align:center;
  background:#333; cursor:pointer;
}
.tab.active { background:#555; }

.content { display:none; padding:10px; }
.content.active { display:block; }

.card {
  background:#1c1c1c;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.timer {
  font-size:32px;
  text-align:center;
  margin:10px 0;
}
</style>
</head>

<body>

<header><h2>Fire / EMS Toolkit</h2></header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Funnel</div>
  <div class="tab" onclick="showTab(1)">Timers</div>
  <div class="tab" onclick="showTab(2)">SOG</div>
</div>

<div id="tab0" class="content active"></div>
<div id="tab1" class="content"></div>
<div id="tab2" class="content"></div>

<script>
let state = {};

// ---------- TAB SWITCH ----------
function showTab(i){
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("active", idx===i);
  });
  document.querySelectorAll(".content").forEach((c,idx)=>{
    c.classList.toggle("active", idx===i);
  });

  if(i===0) buildFunnel();
  if(i===1) buildTimers();
  if(i===2) buildSOG();
}

// ---------- FUNNEL ----------
function buildFunnel(){
  let c = document.getElementById("tab0");

  c.innerHTML = `
    <div class="card">
      <b>Fire Showing</b>
      <button onclick="setVal('fire','none')">None</button>
      <button onclick="setVal('fire','room')">Room</button>
      <button onclick="setVal('fire','structure')">Structure</button>
    </div>

    <div class="card">
      <b>Smoke Condition</b>
      <button onclick="setVal('smoke','light')">Light</button>
      <button onclick="setVal('smoke','heavy')">Heavy</button>
    </div>

    <div class="card">
      <b>Chief Complaint</b>
      <button onclick="setVal('cc','chest')">Chest Pain</button>
      <button onclick="setVal('cc','breathing')">Breathing</button>
      <button onclick="setVal('cc','ams')">AMS</button>
    </div>

    <button onclick="processFunnel()">Process →</button>

    <div id="output"></div>
  `;
}

function setVal(k,v){ state[k]=v; }

function processFunnel(){
  let out = "";

  // Fire Mode
  let mode = "Investigative";
  if(state.fire==="room") mode="Offensive";
  if(state.fire==="structure") mode="Defensive";

  // Search Priority
  let search = state.smoke==="heavy"
    ? "Bedrooms / survivable spaces"
    : "Standard search";

  // Medical
  let medical = state.cc==="chest"
    ? "Cardiac alert"
    : "Standard protocol";

  out = `
    <div class="card">
      <b>Mode:</b> ${mode}<br>
      <b>Search:</b> ${search}<br>
      <b>Medical:</b> ${medical}
    </div>
  `;

  document.getElementById("output").innerHTML = out;
}

// ---------- TIMERS ----------
let pulseInt = null;
let epiInt = null;

let pulse = 120;
let epi = 240;

function buildTimers(){
  document.getElementById("tab1").innerHTML = `
    <div class="card">
      <b>2-Min Pulse Check</b>
      <div class="timer" id="pulse">${format(pulse)}</div>
      <button onclick="startPulse()">Start</button>
      <button onclick="resetPulse()">Reset</button>
    </div>

    <div class="card">
      <b>4-Min Epi Timer</b>
      <div class="timer" id="epi">${format(epi)}</div>
      <button onclick="startEpi()">Start</button>
      <button onclick="resetEpi()">Reset</button>
    </div>
  `;
}

function format(s){
  let m = Math.floor(s/60);
  let sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function startPulse(){
  if(pulseInt) return;
  pulseInt = setInterval(()=>{
    if(pulse<=0){
      alert("Pulse Check!");
      clearInterval(pulseInt);
      pulseInt=null;
    } else {
      pulse--;
      document.getElementById("pulse").innerText = format(pulse);
    }
  },1000);
}

function resetPulse(){
  clearInterval(pulseInt);
  pulseInt=null;
  pulse=120;
  document.getElementById("pulse").innerText="02:00";
}

function startEpi(){
  if(epiInt) return;
  epiInt = setInterval(()=>{
    if(epi<=0){
      alert("EPI TIME!");
      clearInterval(epiInt);
      epiInt=null;
    } else {
      epi--;
      document.getElementById("epi").innerText = format(epi);
    }
  },1000);
}

function resetEpi(){
  clearInterval(epiInt);
  epiInt=null;
  epi=240;
  document.getElementById("epi").innerText="04:00";
}

// ---------- SOG ----------
function buildSOG(){
  document.getElementById("tab2").innerHTML = `
    <div class="card">
      <b>SOG Notes</b>
      <textarea id="sog" style="width:100%;height:150px;background:#151515;color:#fff;"></textarea>
      <button onclick="saveSOG()">Save</button>
    </div>
  `;

  let saved = localStorage.getItem("sog");
  if(saved) document.getElementById("sog").value = saved;
}

function saveSOG(){
  localStorage.setItem("sog", document.getElementById("sog").value);
  alert("Saved");
}

// INIT
buildFunnel();
</script>

</body>
</html>
