<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire/EMS Toolkit</title>

<style>
body { font-family: Arial; margin:0; background:#111; color:#fff; }
header { padding:12px; text-align:center; background:#222; }

.tabs { display:flex; }
.tab {
  flex:1; padding:12px; text-align:center;
  background:#333; cursor:pointer;
}
.tab.active { background:#555; }

.content { display:none; padding:10px; }
.content.active { display:block; }

.card {
  background:#1c1c1c;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.timer {
  font-size:32px;
  text-align:center;
  margin:10px 0;
}
</style>
</head>

<body>

<header><h2>Fire / EMS Toolkit</h2></header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Funnel</div>
  <div class="tab" onclick="showTab(1)">Timers</div>
  <div class="tab" onclick="showTab(2)">SOG</div>
</div>

<div id="tab0" class="content active"></div>
<div id="tab1" class="content"></div>
<div id="tab2" class="content"></div>

<script>
let currentModule = "";
let state = {};

// ---------------- OPEN MODULE ----------------
function openModule(name){
  currentModule = name;
  state = {};
  document.getElementById("home").classList.add("hidden");
  document.getElementById("module").classList.remove("hidden");
  showTab(0);
}

// ---------------- NAV ----------------
function goHome(){
  document.getElementById("module").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function showTab(i){
  document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("active", idx===i));
  document.querySelectorAll(".content").forEach((c,idx)=>c.classList.toggle("active", idx===i));

  if(i===0) buildTab0();
  if(i===1) buildTab1();
  if(i===2) buildTab2();
}

// ---------------- BUTTON SELECT ----------------
function selectBtn(group, value, el){
  state[group] = value;

  // remove selection from siblings
  el.parentElement.querySelectorAll("button").forEach(b=>{
    b.classList.remove("selected");
  });

  el.classList.add("selected");
}

// ---------------- TAB 0 ----------------
function buildTab0(){
  let c = document.getElementById("tab0");
  c.innerHTML = "";

  if(currentModule==="sizeup"){
    c.innerHTML = `
      <div class="card">Fire Showing?
        <button onclick="selectBtn('fire','none',this)">None</button>
        <button onclick="selectBtn('fire','room',this)">Room</button>
        <button onclick="selectBtn('fire','structure',this)">Structure</button>
      </div>
      <div class="card">Occupancy
        <button onclick="selectBtn('occ','res',this)">Residential</button>
        <button onclick="selectBtn('occ','comm',this)">Commercial</button>
      </div>
    `;
  }

  if(currentModule==="search"){
    c.innerHTML = `
      <div class="card">Smoke
        <button onclick="selectBtn('smoke','light',this)">Light</button>
        <button onclick="selectBtn('smoke','heavy',this)">Heavy</button>
      </div>
      <div class="card">Layout
        <button onclick="selectBtn('layout','open',this)">Open</button>
        <button onclick="selectBtn('layout','closed',this)">Closed</button>
      </div>
    `;
  }

  if(currentModule==="medical"){
    c.innerHTML = `
      <div class="card">Chief Complaint
        <button onclick="selectBtn('cc','chest',this)">Chest Pain</button>
        <button onclick="selectBtn('cc','breathing',this)">Breathing</button>
        <button onclick="selectBtn('cc','ams',this)">AMS</button>
      </div>
    `;
  }

  if(currentModule==="stroke"){
    c.innerHTML = `
      <div class="card">Last Known Well
        <button onclick="selectBtn('lkw','<4.5',this)">< 4.5 hrs</button>
        <button onclick="selectBtn('lkw','>4.5',this)">> 4.5 hrs</button>
      </div>
      <div class="card">FAST
        <button onclick="selectBtn('fast','yes',this)">Positive</button>
        <button onclick="selectBtn('fast','no',this)">Negative</button>
      </div>
    `;
  }

  if(currentModule==="alarm"){
    c.innerHTML = `
      <div class="card">Alarm Type
        <button onclick="selectBtn('alarm','waterflow',this)">Waterflow</button>
        <button onclick="selectBtn('alarm','smoke',this)">Smoke</button>
        <button onclick="selectBtn('alarm','trouble',this)">Trouble</button>
      </div>
    `;
  }
}

// ---------------- TAB 1 ----------------
function buildTab1(){
  let c = document.getElementById("tab1");

  if(Object.keys(state).length === 0){
    c.innerHTML = `<div class="card">⚠️ Make selections first</div>`;
    return;
  }

  if(currentModule==="sizeup"){
    let mode = "Investigative";
    if(state.fire==="room") mode="Offensive";
    if(state.fire==="structure") mode="Defensive";
    c.innerHTML = `<div class="card"><b>Mode:</b> ${mode}</div>`;
    state.mode = mode;
  }

  if(currentModule==="search"){
    let priority = state.smoke==="heavy" ? "Bedrooms first" : "Standard sweep";
    c.innerHTML = `<div class="card">${priority}</div>`;
    state.priority = priority;
  }

  if(currentModule==="medical"){
    let alert = state.cc==="chest" ? "Cardiac Alert" : "Standard Care";
    c.innerHTML = `<div class="card">${alert}</div>`;
    state.alert = alert;
  }

  if(currentModule==="stroke"){
    let alert = (state.fast==="yes" && state.lkw==="<4.5") ? "Stroke Alert" : "No Alert";
    c.innerHTML = `<div class="card">${alert}</div>`;
    state.stroke = alert;
  }

  if(currentModule==="alarm"){
    let action = state.alarm==="waterflow" ? "Investigate Fire" : "Check Panel";
    c.innerHTML = `<div class="card">${action}</div>`;
    state.action = action;
  }
}

// ---------------- TAB 2 ----------------
function buildTab2(){
  let c = document.getElementById("tab2");

  if(Object.keys(state).length === 0){
    c.innerHTML = `<div class="card">⚠️ No decision yet</div>`;
    return;
  }

  if(currentModule==="sizeup"){
    c.innerHTML = `<div class="card">Deploy based on <b>${state.mode}</b> mode</div>`;
  }

  if(currentModule==="search"){
    c.innerHTML = `<div class="card">Search: ${state.priority}</div>`;
  }

  if(currentModule==="medical"){
    c.innerHTML = `<div class="card">Treatment: ${state.alert}</div>`;
  }

  if(currentModule==="stroke"){
    c.innerHTML = `<div class="card">Decision: ${state.stroke}</div>`;
  }

  if(currentModule==="alarm"){
    c.innerHTML = `<div class="card">Action: ${state.action}</div>`;
  }
}
</script>

</body>
</html>
